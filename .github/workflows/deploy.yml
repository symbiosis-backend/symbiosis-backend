name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check SSH secret shape
        run: |
          echo "host_set=${{ secrets.SERVER_HOST != '' }}"
          echo "user_set=${{ secrets.SERVER_USER != '' }}"
          echo "key_set=${{ secrets.SERVER_SSH_KEY != '' }}"
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key <<'EOF'
          ${{ secrets.SERVER_SSH_KEY }}
          EOF
          sed -i 's/^[[:space:]]*//' ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "key_lines=$(wc -l < ~/.ssh/deploy_key)"
          echo "key_header=$(head -n 1 ~/.ssh/deploy_key | sed 's/./*/g')"
          ssh-keygen -y -f ~/.ssh/deploy_key >/tmp/deploy_key.pub
          echo "public_key_fingerprint=$(ssh-keygen -lf /tmp/deploy_key.pub | awk '{print $2}')"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== CONNECTED TO SERVER ==="
            whoami
            echo "=== SYNC CHECKOUT ==="
            for dir in /home/deploy/symbiosis-backend /home/deploy/backend /home/deploy/app /var/www/symbiosis-backend; do
              if [ -d "$dir/.git" ]; then
                echo "Using checkout: $dir"
                cd "$dir"
                git fetch origin main
                git reset --hard origin/main
                git clean -fd
                break
              fi
            done
            echo "=== START DEPLOY ==="
            bash /home/deploy/deploy_backend.sh
            echo "=== DEPLOY FINISHED ==="
